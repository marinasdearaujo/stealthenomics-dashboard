<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StealthEnomics Marketing Dashboard</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<script src="chart.min.js"></script>
<script>
// Fallback: if Chart.js didn't load via script tag, load it synchronously
if(typeof Chart==='undefined'){
  var xhr=new XMLHttpRequest();
  xhr.open('GET','chart.min.js',false);
  xhr.send();
  if(xhr.status===200)eval(xhr.responseText);
}
</script>
<style>
:root{--blue:#1975BB;--green:#B3C234;--dark:#001A35;--a1:#0F2952;--a2:#21386F;--a3:#4670AF;--a4:#6F90C8;--al:#90BFED;--bg:#001A35;--card:#0F2952;--cb:#21386F;--text:#F1F7FB;--dim:#90BFED;--up:#B3C234;--dn:#CC0000;--fl:#6F90C8;--fb:#1877f2;--ig:#e1306c;--li:#0e9aa7;--paid:#fbbf24}
*{margin:0;padding:0;box-sizing:border-box}body{font-family:'Roboto',sans-serif;background:var(--bg);color:var(--text);line-height:1.5}
h1,h2,h3,.st,.kc .l,.tab{font-family:'Montserrat',sans-serif}
.ctn{max-width:1400px;margin:0 auto;padding:18px}
.hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--cb)}.hdr-l{display:flex;align-items:center;gap:12px}.hdr-l img{height:30px}.hdr h1{font-size:17px;font-weight:700}.hdr .m{text-align:right;color:var(--dim);font-size:10px}
.tabs{display:flex;gap:2px;margin-bottom:14px;border-bottom:2px solid var(--cb)}.tab{padding:7px 16px;font-size:11px;font-weight:600;cursor:pointer;color:var(--dim);border-bottom:2px solid transparent;margin-bottom:-2px;transition:.2s}.tab:hover{color:var(--text)}.tab.active{color:var(--green);border-bottom-color:var(--green)}.tc{display:none}.tc.active{display:block}
.fil{display:flex;gap:5px;margin-bottom:14px;align-items:center;flex-wrap:wrap}.fb{padding:4px 10px;border-radius:5px;border:1px solid var(--cb);background:0;color:var(--dim);font-size:10px;cursor:pointer;font-family:'Montserrat';font-weight:600;transition:.2s}.fb:hover{border-color:var(--a3);color:var(--text)}.fb.ac{background:var(--blue);border-color:var(--blue);color:#fff}
.dc{display:none;gap:5px;align-items:center}.dc.vis{display:flex}.dc input{padding:3px 6px;border-radius:4px;border:1px solid var(--cb);background:var(--card);color:var(--text);font-size:10px}
.sb{flex:1;min-width:200px;position:relative}.sb input{width:100%;padding:6px 10px 6px 28px;border-radius:7px;border:1px solid var(--cb);background:var(--card);color:var(--text);font-size:11px;outline:0}.sb input:focus{border-color:var(--blue)}.sb input::placeholder{color:var(--a4)}.sb .si{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--a4);font-size:12px}
.sa{margin-bottom:12px;padding:10px 14px;background:var(--card);border:1px solid var(--blue);border-radius:7px;font-size:12px;display:none;position:relative}.sa.vis{display:block}.sa .sc{position:absolute;top:6px;right:10px;cursor:pointer;color:var(--dim);font-size:15px}.sa .sc:hover{color:var(--text)}
.kg{display:grid;grid-template-columns:repeat(6,1fr);gap:9px;margin-bottom:18px}.kc{background:var(--card);border:1px solid var(--cb);border-radius:9px;padding:12px}.kc .l{font-size:9px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin-bottom:2px;font-weight:600}.kc .v{font-size:22px;font-weight:800}.kc .ch{font-size:10px;margin-top:2px}.kc .ch.up{color:var(--up)}.kc .ch.dn{color:var(--dn)}.kc .ch.fl{color:var(--fl)}
.sec{margin-bottom:20px}.st{font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1.5px;color:var(--green);margin-bottom:10px;display:flex;align-items:center;gap:7px}.st::before{content:'';width:3px;height:12px;background:var(--green);border-radius:2px}.ss{font-size:10px;color:var(--dim);margin-top:-7px;margin-bottom:10px;padding-left:10px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}.g2{display:grid;grid-template-columns:1fr 1fr;gap:10px}.g21{display:grid;grid-template-columns:2fr 1fr;gap:10px}
.cd{background:var(--card);border:1px solid var(--cb);border-radius:9px;padding:14px}.cd h3{font-size:11px;font-weight:700;margin-bottom:8px}.cd .sub{font-size:9px;color:var(--dim);font-weight:400}
.pi{display:inline-block;width:7px;height:7px;border-radius:50%;margin-right:4px}
.br{display:flex;align-items:center;margin-bottom:7px}.br .bl{width:75px;font-size:11px;font-weight:500}.br .bt{flex:1;height:28px;background:#1a2a44;border-radius:5px;position:relative;overflow:hidden}.br .bf{height:100%;border-radius:5px;display:flex;align-items:center;padding:0 8px;font-size:10px;font-weight:700;transition:width .8s}.br .bv{position:absolute;right:6px;top:50%;transform:translateY(-50%);font-size:9px;color:var(--dim)}
.rec{margin-top:8px;padding:7px 10px;background:#B3C23410;border:1px solid #B3C23430;border-radius:7px;font-size:10px;color:var(--green)}
.conc{margin-top:8px;padding:7px 10px;background:#1975BB10;border:1px solid #1975BB30;border-radius:7px;font-size:10px;color:var(--al)}.conc.warn{background:#CC000010;border-color:#CC000030;color:#ff8888}
.funnel{display:flex;align-items:center;gap:3px;overflow-x:auto}.fs{flex:1;min-width:80px;text-align:center;padding:12px 6px;border-radius:9px;background:linear-gradient(135deg,var(--a1),var(--card));border:1px solid var(--cb)}.fs .sv{font-size:22px;font-weight:800;color:var(--al);font-family:'Montserrat'}.fs .sl{font-size:8px;text-transform:uppercase;letter-spacing:1px;color:var(--dim);margin-bottom:2px;font-family:'Montserrat';font-weight:600}.fs .sch{font-size:9px;margin-top:2px}.fs.empty{opacity:.4}.fa{font-size:12px;color:var(--a4)}
.mg{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:12px;padding-top:12px;border-top:1px solid var(--cb)}.mb{text-align:center;padding:7px;background:var(--a1);border-radius:7px}.mb .mv{font-size:18px;font-weight:800;color:var(--a4);font-family:'Montserrat'}.mb .ml{font-size:8px;text-transform:uppercase;color:var(--dim);letter-spacing:1px;font-family:'Montserrat';font-weight:600}
.dt{width:100%;border-collapse:collapse;font-size:10px}.dt th{text-align:left;padding:6px 7px;border-bottom:1px solid var(--cb);color:var(--dim);font-size:8px;text-transform:uppercase;letter-spacing:1px}.dt td{padding:6px 7px;border-bottom:1px solid #1a2a44}.dt tr:hover td{background:#1a3568}.dt .n{text-align:right;font-variant-numeric:tabular-nums}.dt .w{color:var(--dn);font-weight:700}.dt .g{color:var(--up);font-weight:700}
.tp{padding:7px 0;border-bottom:1px solid #1a2a44}.tp:last-child{border-bottom:0}.tp .ph{display:flex;justify-content:space-between;align-items:flex-start;gap:8px}.tp .pt{font-size:10px;line-height:1.4}.tp .pm{font-size:9px;color:var(--dim)}.tp .ps{text-align:right;white-space:nowrap}.tp .pr{font-size:14px;font-weight:800;color:var(--green);font-family:'Montserrat'}.tp .pb{font-size:8px;color:var(--dim)}
.cc{position:relative;height:190px}.ccs{height:150px}
.mini-dt{width:100%;font-size:10px;border-collapse:collapse}.mini-dt th{text-align:left;padding:4px 6px;color:var(--dim);font-size:8px;text-transform:uppercase;border-bottom:1px solid var(--cb)}.mini-dt td{padding:4px 6px;border-bottom:1px solid #1a2a44}
@media(max-width:1024px){.kg{grid-template-columns:repeat(3,1fr)}.g3,.g2,.g21{grid-template-columns:1fr}}
@media(max-width:640px){.kg{grid-template-columns:repeat(2,1fr)}.funnel{flex-direction:column}.fa{transform:rotate(90deg)}}
</style>
</head>
<body>
<div class="ctn">
<div class="hdr"><div class="hdr-l"><img src="logo.png" alt="SE"><h1>Marketing Performance Dashboard</h1></div><div class="m"><div id="dr"></div><div id="lu"></div></div></div>
<div class="tabs">
  <div class="tab active" onclick="switchTab('overview',this)">Overview</div>
  <div class="tab" onclick="switchTab('facebook',this)">Facebook</div>
  <div class="tab" onclick="switchTab('instagram',this)">Instagram</div>
  <div class="tab" onclick="switchTab('linkedin',this)">LinkedIn</div>
  <div class="tab" onclick="switchTab('ads',this)">Paid Ads</div>
  <div class="tab" onclick="switchTab('youtube',this)">YouTube</div>
  <div class="tab" onclick="switchTab('community',this)">Community</div>
</div>
<div class="fil">
  <button class="fb ac" onclick="setR(this,'week')">This Week</button>
  <button class="fb" onclick="setR(this,'month')">This Month</button>
  <button class="fb" onclick="setR(this,'quarter')">Last 90 Days</button>
  <button class="fb" onclick="setR(this,'all')">All Time</button>
  <button class="fb" onclick="toggleC()">Custom</button>
  <div class="dc" id="cdi"><input type="date" id="df"><span style="color:var(--dim);font-size:10px">to</span><input type="date" id="dt"><button class="fb" onclick="setR(this,'custom')">Apply</button></div>
  <div class="sb"><span class="si">&#128269;</span><input type="text" id="qi" placeholder='Ask: "best content for Instagram?" "campaign ROI?" "when to post?"' onkeydown="if(event.key==='Enter')ask()"></div>
</div>
<div class="sa" id="sa"><span class="sc" onclick="this.parentElement.classList.remove('vis')">&#10005;</span><div id="at"></div></div>
<div class="tc active" id="tab-overview"><div id="dashboard-content"></div></div>
<div class="tc" id="tab-facebook"><div id="ch-facebook"></div></div>
<div class="tc" id="tab-instagram"><div id="ch-instagram"></div></div>
<div class="tc" id="tab-linkedin"><div id="ch-linkedin"></div></div>
<div class="tc" id="tab-ads"><div id="ch-ads"></div></div>
<div class="tc" id="tab-youtube"><div id="ch-youtube"></div></div>
<div class="tc" id="tab-community"><div id="ch-community"></div></div>
</div>

<script>
var CL={fb:'#1877f2',ig:'#e1306c',li:'#0e9aa7',gr:'#B3C234',bl:'#1975BB',pd:'#fbbf24'};
var MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
var D=null, charts=[], activeRange='week';

// ── Utility functions ──
function pch(p,c){if(!p&&!c)return{t:'--',c:'fl'};if(p===0)return c>0?{t:'+'+c,c:'up'}:{t:'--',c:'fl'};var v=((c-p)/p*100).toFixed(0);return v>0?{t:'+'+v+'%',c:'up'}:v<0?{t:v+'%',c:'dn'}:{t:'0%',c:'fl'};}
function fnum(n){if(!n&&n!==0)return'--';if(n>=1e6)return(n/1e6).toFixed(1)+'M';if(n>=1e3)return(n/1e3).toFixed(1)+'K';return n.toLocaleString();}
function fdate(d){if(!d)return'--';var p=String(d).split('-');return p.length>=3?MO[parseInt(p[1])-1]+' '+parseInt(p[2]):d;}
function fdrange(s,e){return fdate(s)+' - '+fdate(e);}
function arw(c){return c==='up'?'&#9650;':c==='dn'?'&#9660;':'&#9644;';}
function pcolor(p){return p==='Facebook'?CL.fb:p==='Instagram'?CL.ig:p==='YouTube'?'#FF0000':CL.li;}

// ── Tab switching ──
function switchTab(t,el){
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  document.querySelectorAll('.tc').forEach(x=>x.classList.remove('active'));
  if(el)el.classList.add('active');
  document.getElementById('tab-'+t).classList.add('active');
  if(t==='ads'){try{renderAdsTab(document.getElementById('ch-ads'));}catch(e){document.getElementById('ch-ads').innerHTML='<p style="color:red">Error: '+e.message+'</p>';}}
  else if(t==='youtube'){try{renderYouTubeTab(document.getElementById('ch-youtube'));}catch(e){document.getElementById('ch-youtube').innerHTML='<p style="color:red">Error: '+e.message+'</p>';}}
  else if(t==='community'){try{renderCommunityTab(document.getElementById('ch-community'));}catch(e){document.getElementById('ch-community').innerHTML='<p style="color:red">Error: '+e.message+'</p>';}}
  else if(t!=='overview'){var pname={facebook:'Facebook',instagram:'Instagram',linkedin:'LinkedIn'}[t];if(pname){try{var r2=getRange();var fp2=r2?(D.all_posts||[]).filter(function(p){return p.date>=r2.s&&p.date<=r2.e;}):D.all_posts;renderChannelDetail(pname,document.getElementById('ch-'+t),fp2);}catch(e){document.getElementById('ch-'+t).innerHTML='<p style="color:red">Error: '+e.message+'</p>';}}}
}

// ── Date filtering ──
function setR(el,r){document.querySelectorAll('.fil .fb').forEach(b=>b.classList.remove('ac'));el.classList.add('ac');activeRange=r;if(r==='custom'){document.getElementById('cdi').classList.add('vis');}else{document.getElementById('cdi').classList.remove('vis');}if(D)renderAll();}
function toggleC(){document.getElementById('cdi').classList.toggle('vis');}
function getRange(){
  var now=new Date();var s,e=now;
  if(activeRange==='week'){s=new Date(now);s.setDate(s.getDate()-7);}
  else if(activeRange==='month'){s=new Date(now);s.setDate(s.getDate()-30);}
  else if(activeRange==='quarter'){s=new Date(now);s.setDate(s.getDate()-90);}
  else if(activeRange==='all'){s=new Date('2025-01-01');}
  else{var a=document.getElementById('df').value,b=document.getElementById('dt').value;if(a&&b){s=new Date(a);e=new Date(b);}else{s=new Date('2025-01-01');}}
  // Calculate previous period (same duration, shifted back)
  var duration=Math.round((e-s)/(1000*60*60*24));
  var ps=new Date(s);ps.setDate(ps.getDate()-duration);
  var pe=new Date(s);pe.setDate(pe.getDate()-1);
  return{s:s.toISOString().slice(0,10),e:e.toISOString().slice(0,10),ps:ps.toISOString().slice(0,10),pe:pe.toISOString().slice(0,10),label:activeRange,days:duration};
}
function filterPosts(posts,range){return (posts||[]).filter(function(p){return p.date>=range.s&&p.date<=range.e;});}
function filterPostsPrev(posts,range){return (posts||[]).filter(function(p){return p.date>=range.ps&&p.date<=range.pe;});}

// ── Destroy old charts before re-rendering ──
function destroyCharts(){charts.forEach(c=>{try{c.destroy();}catch(e){}});charts=[];}
function makeChart(id,config){var ctx=document.getElementById(id);if(!ctx)return null;var c=new Chart(ctx,config);charts.push(c);return c;}
function safeEl(id){var el=document.getElementById(id);if(!el){el=document.createElement('div');}return el;}

// ── MAIN RENDER ──
function renderAll(){
  if(!D)return;
  try{
  destroyCharts();
  var range=getRange();
  if(!range)return;
  var posts=(D.all_posts||[]).filter(function(p){return p.date>=range.s&&p.date<=range.e;});
  var k=D.kpis;
  if(!k)return;

  // Compute weekly buckets from FILTERED posts (used by reach trend)
  var weekBuckets={};
  var MO=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];
  posts.forEach(function(p){
    var d2=new Date(p.date);var ws=new Date(d2);ws.setDate(d2.getDate()-d2.getDay());
    var wkey=ws.toISOString().slice(0,10);
    if(!weekBuckets[wkey])weekBuckets[wkey]={fb_r:0,fb_e:0,fb_boost:0,ig_r:0,ig_e:0,li_r:0,li_e:0,yt_v:0,yt_e:0,yt_org:0,yt_paid:0};
    if(p.platform==='Facebook'){
      if(p.boosted){weekBuckets[wkey].fb_boost+=p.reach;}
      else{weekBuckets[wkey].fb_r+=p.reach;}
      weekBuckets[wkey].fb_e+=p.engagement;
    }
    if(p.platform==='Instagram'){weekBuckets[wkey].ig_r+=p.reach;weekBuckets[wkey].ig_e+=p.engagement;}
    if(p.platform==='LinkedIn'){weekBuckets[wkey].li_r+=p.reach;weekBuckets[wkey].li_e+=p.engagement;}
    if(p.platform==='YouTube'){weekBuckets[wkey].yt_v+=p.reach;weekBuckets[wkey].yt_e+=p.engagement;weekBuckets[wkey].yt_org+=(p.yt_organic_views||0);weekBuckets[wkey].yt_paid+=(p.yt_paid_views||0);}
  });
  var weekKeys=Object.keys(weekBuckets).sort();
  var weekLabels=weekKeys.map(function(k2){return fdate(k2);});

  // Compute monthly buckets from ALL posts (unfiltered — always shows full history for comparison)
  var monthBuckets={};
  D.all_posts.forEach(function(p){
    if(p.date<'2026')return; // Only 2026 data
    var mkey=p.date.slice(0,7);
    if(!monthBuckets[mkey])monthBuckets[mkey]={fb_r:0,fb_e:0,fb_boost:0,ig_r:0,ig_e:0,li_r:0,li_e:0,yt_v:0,yt_e:0,yt_org:0,yt_paid:0};
    if(p.platform==='Facebook'){
      if(p.boosted){monthBuckets[mkey].fb_boost+=p.reach;}
      else{monthBuckets[mkey].fb_r+=p.reach;}
      monthBuckets[mkey].fb_e+=p.engagement;
    }
    if(p.platform==='Instagram'){monthBuckets[mkey].ig_r+=p.reach;monthBuckets[mkey].ig_e+=p.engagement;}
    if(p.platform==='LinkedIn'){monthBuckets[mkey].li_r+=p.reach;monthBuckets[mkey].li_e+=p.engagement;}
    if(p.platform==='YouTube'){monthBuckets[mkey].yt_v+=p.reach;monthBuckets[mkey].yt_e+=p.engagement;monthBuckets[mkey].yt_org+=(p.yt_organic_views||0);monthBuckets[mkey].yt_paid+=(p.yt_paid_views||0);}
  });
  var monthKeys=Object.keys(monthBuckets).sort();
  var monthLabels=monthKeys.map(function(k){var parts=k.split('-');return MO[parseInt(parts[1])-1]+' '+parts[0].slice(2);});

  // Stats from filtered posts — CURRENT period (including YouTube)
  var byP={Facebook:{r:0,e:0,n:0},Instagram:{r:0,e:0,n:0},LinkedIn:{r:0,e:0,n:0},YouTube:{r:0,e:0,n:0}};
  posts.forEach(function(p){if(byP[p.platform]){byP[p.platform].r+=p.reach;byP[p.platform].e+=p.engagement;byP[p.platform].n++;}});
  var tot={r:0,e:0,n:0};['Facebook','Instagram','LinkedIn','YouTube'].forEach(function(k){var v=byP[k];tot.r+=v.r;tot.e+=v.e;tot.n+=v.n;});

  // Stats from PREVIOUS period
  var prevPosts=filterPostsPrev(D.all_posts,range);
  var byPP={Facebook:{r:0,e:0,n:0},Instagram:{r:0,e:0,n:0},LinkedIn:{r:0,e:0,n:0},YouTube:{r:0,e:0,n:0}};
  prevPosts.forEach(function(p){if(byPP[p.platform]){byPP[p.platform].r+=p.reach;byPP[p.platform].e+=p.engagement;byPP[p.platform].n++;}});
  var totP={r:0,e:0,n:0};['Facebook','Instagram','LinkedIn','YouTube'].forEach(function(k){var v=byPP[k];totP.r+=v.r;totP.e+=v.e;totP.n+=v.n;});
  var hasPrev=range.label!=='all'&&prevPosts.length>0;
  var periodLabel=range.label==='week'?'vs prev week':range.label==='month'?'vs prev month':range.label==='quarter'?'vs prev 90 days':'vs prev period';

  var tf=k.followers.total,tfp=k.followers_prev.total;

  // Header
  var hdrText=fdrange(range.s,range.e)+' ('+posts.length+' posts)';
  if(hasPrev)hdrText+='  |  Prev: '+fdrange(range.ps,range.pe)+' ('+prevPosts.length+' posts)';
  safeEl('dr').textContent=hdrText;
  safeEl('lu').textContent='Updated: '+D.generated_at;

  // Build dashboard HTML
  var h='';

  // Get monthly ads data FIRST (needed for KPI cards)
  var ovAdsMonthly=D.ads_monthly||{};
  var ovMonthKeys=Object.keys(ovAdsMonthly).sort();
  var ovFilterMonth=range?range.e.substring(0,7):null;
  var ovCurrMonth=null,ovPrevMonth=null;
  if(ovFilterMonth&&ovAdsMonthly[ovFilterMonth])ovCurrMonth=ovFilterMonth;
  else if(ovMonthKeys.length>0)ovCurrMonth=ovMonthKeys[ovMonthKeys.length-1];
  if(ovCurrMonth){var oi=ovMonthKeys.indexOf(ovCurrMonth);if(oi>0)ovPrevMonth=ovMonthKeys[oi-1];}
  var ovCamps=ovCurrMonth?ovAdsMonthly[ovCurrMonth]:(D.campaigns||[]);
  var ovPrevCamps=ovPrevMonth?ovAdsMonthly[ovPrevMonth]:[];
  var ovMonthLabel=ovCurrMonth?MO[parseInt(ovCurrMonth.split('-')[1])-1]:'Current';

  // Compute ad spend/CPL from monthly filtered data
  var ovCampsS=ovCamps||[];
  var ovPrevCampsS=ovPrevCamps||[];
  var ovAdSpend=ovCampsS.reduce(function(s,c){return s+c.spend;},0);
  var ovPrevAdSpend=ovPrevCampsS.reduce(function(s,c){return s+c.spend;},0);
  var ovLeadC2=ovCampsS.filter(function(c){var n=c.name.toLowerCase();return n.indexOf('lead')>=0||n.indexOf('instant')>=0||n.indexOf('broker')>=0;});
  var ovLeadR2=ovLeadC2.reduce(function(s,c){return s+c.results;},0);
  var ovLeadS2=ovLeadC2.reduce(function(s,c){return s+c.spend;},0);
  var ovCPL3=ovLeadR2>0?ovLeadS2/ovLeadR2:0;
  var pOvLeadC2=ovPrevCampsS.filter(function(c){var n=c.name.toLowerCase();return n.indexOf('lead')>=0||n.indexOf('instant')>=0||n.indexOf('broker')>=0;});
  var pOvLeadR2=pOvLeadC2.reduce(function(s,c){return s+c.results;},0);
  var pOvCPL3=pOvLeadR2>0?pOvLeadC2.reduce(function(s,c){return s+c.spend;},0)/pOvLeadR2:0;

  // KPI cards
  h+='<div class="kg">';
  [{l:'Total Reach',c:tot.r,p:hasPrev?totP.r:k.total.prev_reach},{l:'Total Engagement',c:tot.e,p:hasPrev?totP.e:k.total.prev_engagement},{l:'Total Posts',c:tot.n,p:hasPrev?totP.n:k.total.prev_posts},{l:'Followers',c:tf,p:tfp},{l:'Ad Spend',c:ovAdSpend,p:ovPrevAdSpend,pfx:'$'},{l:'Cost per Lead',c:ovCPL3,p:pOvCPL3,pfx:'$'}].forEach(function(c){

  var audPosts=posts.filter(function(p){return p.audience&&p.audience!==''&&p.audience!=='All';});
  var ac3={};
  audPosts.forEach(function(p){if(!ac3[p.audience])ac3[p.audience]={totalEng:0,totalReach:0,n:0};ac3[p.audience].totalEng+=p.engagement;ac3[p.audience].totalReach+=p.reach;ac3[p.audience].n++;});
  var ae2=Object.entries(ac3).sort(function(a,b){return(b[1].totalReach>0?b[1].totalEng/b[1].totalReach:0)-(a[1].totalReach>0?a[1].totalEng/a[1].totalReach:0);});
  if(ae2.length>0){
    makeChart('c-aud',{type:'bar',data:{labels:ae2.map(function(a){return a[0];}),datasets:[{data:ae2.map(function(a){return a[1].totalReach>0?(a[1].totalEng/a[1].totalReach*100).toFixed(1):0;}),backgroundColor:ae2.map(function(_,i){return['#B3C234','#1975BB','#4670AF','#90BFED'][i%4]+'90';}),borderWidth:1}]},options:{indexAxis:'y',...chartOpts,plugins:{legend:{display:false}}}});
  }

  // Content conclusion — balance ER and volume
  var contentConc=safeEl('content-conc');
  if(ee2.length>0){
    // Score = ER * sqrt(interactions) — rewards both quality and volume
    var scored=ee2.map(function(e){var er=e[1].totalReach>0?e[1].totalEng/e[1].totalReach:0;return{cat:e[0],er:er,eng:e[1].totalEng,n:e[1].n,score:er*Math.sqrt(e[1].totalEng+1)};}).sort(function(a,b){return b.score-a.score;});
    var best=scored[0];
    contentConc.innerHTML='&#9733; <strong>'+best.cat+'</strong> performs best overall — '+(best.er*100).toFixed(1)+'% ER with '+best.eng+' total interactions across '+best.n+' posts.';
    if(scored.length>1){
      var second=scored[1];
      contentConc.innerHTML+=' Runner-up: <strong>'+second.cat+'</strong> ('+(second.er*100).toFixed(1)+'% ER, '+second.eng+' interactions).';
    }
    contentConc.innerHTML+='<br><em>Recommendation: Prioritize '+best.cat+' content for best engagement quality + volume.</em>';
  }

  // Audience conclusion
  var audConc=safeEl('audience-conc');
  if(ae2.length>0){audConc.innerHTML='&#9733; The <strong>'+ae2[0][0]+'</strong> audience has the highest ER at '+(ae2[0][1].totalReach>0?(ae2[0][1].totalEng/ae2[0][1].totalReach*100).toFixed(1):0)+'%. Tailor content to this segment for best results.';}

  // Reach conclusion — organic vs paid
  var reachConc=safeEl('reach-conc');
  var organicReach=0,boostedReach=0;
  posts.forEach(function(p){if(p.boosted){boostedReach+=p.reach;}else{organicReach+=p.reach;}});
  var prevOrganic=0,prevBoosted=0;
  prevPosts.forEach(function(p){if(p.boosted){prevBoosted+=p.reach;}else{prevOrganic+=p.reach;}});
  var orgCh=hasPrev?pch(prevOrganic,organicReach):{t:'',c:'fl'};
  var boostCh=hasPrev?pch(prevBoosted,boostedReach):{t:'',c:'fl'};
  var reachText='<strong>Organic reach: '+organicReach.toLocaleString()+'</strong>';
  if(hasPrev)reachText+=' ('+orgCh.t+' '+periodLabel+')';
  if(boostedReach>0){reachText+=' | <strong>Paid/boosted reach: '+boostedReach.toLocaleString()+'</strong>';if(hasPrev&&prevBoosted>0)reachText+=' ('+boostCh.t+')';}
  reachText+=' | Total: '+tot.r.toLocaleString();
  if(organicReach>0&&boostedReach>0){
    var orgPct=(organicReach/(organicReach+boostedReach)*100).toFixed(0);
    reachText+='<br>'+orgPct+'% of reach is organic. '+(orgPct<50?'Reach is heavily dependent on paid — focus on improving organic content to reduce ad dependency.':'Organic reach is strong — paid is amplifying, not replacing.');
  }
  reachConc.innerHTML=reachText;
  reachConc.classList.toggle('warn',hasPrev&&organicReach<prevOrganic);

  // Spend bubble (campaigns don't change with date filter — they're snapshot data)
  makeChart('c-spend',{type:'bubble',data:{datasets:D.campaigns.filter(function(c){return c.spend>0;}).map(function(c,i){return{label:c.name.substr(0,20),data:[{x:c.spend,y:c.results,r:Math.max(Math.sqrt(c.clicks),3)}],backgroundColor:['#1975BB80','#B3C23480','#4670AF80','#CC000080','#90BFED80','#fbbf2480','#e1306c80'][i%7]};})},options:{...chartOpts,plugins:{legend:{display:false},tooltip:{callbacks:{label:function(ctx){var c=D.campaigns.filter(function(c){return c.spend>0;})[ctx.datasetIndex];return c?c.name+': $'+c.spend+', '+c.results+' results':'';}}}},scales:{x:{title:{display:true,text:'Spend ($)',color:'#6F90C8'},ticks:{color:'#6F90C8'},grid:{color:'#1a2a44'}},y:{title:{display:true,text:'Results',color:'#6F90C8'},ticks:{color:'#6F90C8'},grid:{color:'#1a2a44'}}}}});

  // Leads by source (snapshot data — doesn't change with date filter)
  if(D.lead_sources){var ls=D.lead_sources;
    var totals=ls.months.map(function(_,mi){return ls.labels.reduce(function(s,l){return s+(ls.data[l][mi]||0);},0);});
    var ldatasets=ls.labels.map(function(l,i){return{label:l,data:ls.data[l],backgroundColor:['#fbbf24','#6F90C8','#1975BB','#B3C234','#e1306c'][i%5]+'90',borderWidth:1};});
    var totalPlugin={id:'stackedTotals',afterDraw:function(chart){var ctx=chart.ctx;ctx.save();ctx.fillStyle='#F1F7FB';ctx.font='bold 11px Montserrat';ctx.textAlign='center';var lastDS=chart.data.datasets.length-1;var meta=chart.getDatasetMeta(lastDS);if(meta&&meta.data){meta.data.forEach(function(bar,i){if(totals[i]>0){ctx.fillText(totals[i],bar.x,bar.y-6);}});}ctx.restore();}};
    makeChart('c-leads',{type:'bar',data:{labels:ls.months,datasets:ldatasets},options:{responsive:true,maintainAspectRatio:false,plugins:{legend:{labels:{color:'#90BFED',font:{size:9},padding:20}},tooltip:{mode:'index'}},scales:{x:{stacked:true,ticks:{color:'#6F90C8'},grid:{display:false}},y:{stacked:true,ticks:{color:'#6F90C8'},grid:{color:'#1a2a44'}}}},plugins:[totalPlugin]});
  }

  // Engagement trend — MONTHLY buckets for proper month-over-month comparison
  makeChart('c-eng',{type:'bar',data:{labels:monthLabels,datasets:[
    {label:'Facebook',data:monthKeys.map(function(k){return monthBuckets[k].fb_e;}),backgroundColor:CL.fb+'90'},
    {label:'Instagram',data:monthKeys.map(function(k){return monthBuckets[k].ig_e;}),backgroundColor:CL.ig+'90'},
    {label:'LinkedIn',data:monthKeys.map(function(k){return monthBuckets[k].li_e;}),backgroundColor:CL.li+'90'},
    {label:'YouTube',data:monthKeys.map(function(k){return monthBuckets[k].yt_e||0;}),backgroundColor:'#FF000090'},
  ]},options:{...chartOpts,scales:{x:{stacked:true,ticks:{color:'#6F90C8',font:{size:8}},grid:{display:false}},y:{stacked:true,ticks:{color:'#6F90C8'},grid:{color:'#1a2a44'}}}}});

  // Follower growth
  var fh=D.follower_history;
  if(fh&&fh.length>0){
    makeChart('c-foll',{type:'bar',data:{labels:fh.map(r=>fdate(r.date)),datasets:[
      {label:'Facebook',data:fh.map(r=>r.facebook),backgroundColor:CL.fb+'90',borderColor:CL.fb,borderWidth:1,yAxisID:'y'},
      {label:'Instagram',data:fh.map(r=>r.instagram),backgroundColor:CL.ig+'90',borderColor:CL.ig,borderWidth:1,yAxisID:'y2'},
      {label:'LinkedIn',data:fh.map(r=>r.linkedin),backgroundColor:CL.li+'90',borderColor:CL.li,borderWidth:1,yAxisID:'y2'},
      {label:'YouTube',data:fh.map(function(r){return r.youtube||0;}),backgroundColor:'#FF000090',borderColor:'#FF0000',borderWidth:1,yAxisID:'y2'},
    ]},options:{...chartOpts,scales:{x:{ticks:{color:'#6F90C8',font:{size:8}},grid:{display:false}},y:{position:'left',title:{display:true,text:'Facebook',color:CL.fb,font:{size:9}},ticks:{color:CL.fb},grid:{color:'#1a2a44'}},y2:{position:'right',title:{display:true,text:'IG / LI / YT',color:CL.ig,font:{size:9}},ticks:{color:CL.ig},grid:{display:false}}}}});
  }

  // Pre-render all channel detail tabs (pass filtered posts for date-aware conclusions)
  ['Facebook','Instagram','LinkedIn'].forEach(function(p){
    var el=safeEl('ch-'+p.toLowerCase());
    if(el){try{renderChannelDetail(p,el,posts);}catch(e){el.innerHTML='<p style="color:#CC0000">Error rendering '+p+': '+e.message+'</p>';}}
  });
  }catch(err){
    var di='D:'+(typeof D)+' posts:'+(D&&D.all_posts?D.all_posts.length:'X')+' kpis:'+(D&&D.kpis?'Y':'X')+' camp:'+(D&&D.campaigns?D.campaigns.length:'X')+' top:'+(D&&D.top_posts?D.top_posts.length:'X')+' funnel:'+(D&&D.funnel?'Y':'X')+' trends:'+(D&&D.trends?'Y':'X')+' fh:'+(D&&D.follower_history?D.follower_history.length:'X')+' leads:'+(D&&D.lead_sources?'Y':'X');
    document.getElementById('dashboard-content').innerHTML='<div style="padding:20px"><p style="color:#CC0000;font-size:16px">'+err.message+'</p><pre style="color:#ff8888;font-size:10px;white-space:pre-wrap;margin:10px 0">'+err.stack+'</pre><p style="color:#90BFED;font-size:11px">'+di+'</p></div>';
  }
}

// ── CHANNEL DETAIL TAB ──
function renderChannelDetail(platform,container,filteredPosts){
  try{
  var d=D.channel_detail[platform];
  if(!d){container.innerHTML='<p style="color:var(--dim);padding:20px">No channel detail data for '+platform+'. Data keys: '+Object.keys(D.channel_detail||{}).join(', ')+'</p>';return;}
  var co=pcolor(platform);
  var cid='ch-'+platform.toLowerCase();

  var h='<h2 style="font-family:Montserrat;font-size:16px;margin-bottom:14px"><span class="pi" style="background:'+co+';width:10px;height:10px"></span> '+platform+' Deep Dive</h2>';

  // Key Conclusions box
  var bestEditorial=(d.editorial&&d.editorial.length>0)?d.editorial[0]:null;
  var bestFormat=(d.format&&d.format.length>0)?d.format[0]:null;
  var bestDay=(d.weekdays&&d.weekdays.length>0)?d.weekdays.reduce(function(a,b){return b.avg_eng>a.avg_eng?b:a;}):null;
  var bestHour=(d.hours&&d.hours.length>0)?d.hours.reduce(function(a,b){return b.avg_eng>a.avg_eng?b:a;}):null;
  var bestAud=(d.audience&&d.audience.length>0)?d.audience[0]:null;
  var topPost=(d.top_posts&&d.top_posts.length>0)?d.top_posts[0]:null;

  // Get platform stats from filtered posts (date-aware)
  var platPosts=(filteredPosts||D.all_posts||[]).filter(function(p){return p.platform===platform;});
  var platReach=0,platEng=0;platPosts.forEach(function(p){platReach+=p.reach;platEng+=p.engagement;});
  var platER=platReach>0?(platEng/platReach*100).toFixed(1):0;

  var dateNote=filteredPosts?' (for selected date range: '+platPosts.length+' posts)':' (all time)';
  h+='<div class="cd" style="margin-bottom:14px;border-color:'+co+'40">';
  h+='<h3 style="color:'+co+'">Key Conclusions for '+platform+' <span class="sub">'+dateNote+'</span></h3>';
  h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px">';

  h+='<div style="font-size:10px"><strong>Overall:</strong> '+platPosts.length+' posts | '+fnum(platReach)+' reach | '+platEng+' interactions | '+platER+'% ER</div>';
  if(bestEditorial)h+='<div style="font-size:10px"><strong>Best content:</strong> '+bestEditorial.category+' ('+bestEditorial.total_eng+' interactions, '+bestEditorial.avg_er+'% ER)</div>';
  if(bestFormat)h+='<div style="font-size:10px"><strong>Best format:</strong> '+bestFormat.format+' ('+bestFormat.total_eng+' interactions, '+bestFormat.avg_er+'% ER)</div>';
  if(bestDay)h+='<div style="font-size:10px"><strong>Best day:</strong> '+bestDay.day_name+' ('+bestDay.avg_eng.toFixed(1)+' avg engagement from '+bestDay.posts+' posts)</div>';
  if(bestHour)h+='<div style="font-size:10px"><strong>Best hour:</strong> '+bestHour.hour+':00 UTC ('+bestHour.avg_eng.toFixed(1)+' avg engagement)</div>';
  if(bestAud)h+='<div style="font-size:10px"><strong>Best audience:</strong> '+bestAud.audience+' ('+bestAud.avg_er+'% ER from '+bestAud.posts+' posts)</div>';

  h+='</div>';

  // Recommendation
  var recText='';
  if(bestEditorial&&bestFormat)recText+='Focus on <strong>'+bestFormat.format+'</strong> format with <strong>'+bestEditorial.category+'</strong> content.';
  if(bestDay)recText+=' Post on <strong>'+bestDay.day_name+'s</strong>';
  if(bestHour)recText+=' at <strong>'+bestHour.hour+':00 UTC</strong>';
  if(bestDay||bestHour)recText+='.';
  if(bestAud)recText+=' Target the <strong>'+bestAud.audience+'</strong> audience for highest engagement.';
  if(recText)h+='<div class="rec" style="margin-top:8px">&#9733; '+recText+'</div>';

  h+='</div>';

  // Row 1: Editorial + Format as horizontal bar charts
  h+='<div class="g2" style="margin-bottom:12px">';
  h+=`<div class="cd"><h3>Content Category Performance <span class="sub">(total interactions)</span></h3><div class="cc"><canvas id="${cid}-edit"></canvas></div></div>`;
  h+=`<div class="cd"><h3>Format Performance <span class="sub">(total interactions)</span></h3><div class="cc"><canvas id="${cid}-fmt"></canvas></div></div>`;
  h+='</div>';

  // Row 2: Best Day + Best Hour (or Audience if no hours)
  h+='<div class="g2" style="margin-bottom:12px">';
  if(d.weekdays&&d.weekdays.length>0){
    h+=`<div class="cd"><h3>Best Day to Post <span class="sub">(avg engagement by weekday)</span></h3><div class="cc"><canvas id="${cid}-day"></canvas></div></div>`;
  }
  if(d.hours&&d.hours.length>0){
    h+=`<div class="cd"><h3>Best Time to Post <span class="sub">(avg engagement by hour UTC)</span></h3><div class="cc"><canvas id="${cid}-hr"></canvas></div></div>`;
  }
  // Audience chart
  if(d.audience&&d.audience.length>0){
    h+=`<div class="cd"><h3>Audience Performance <span class="sub">(avg ER%)</span></h3><div class="cc"><canvas id="${cid}-aud"></canvas></div></div>`;
  }
  h+='</div>';

  // Top posts
  h+='<div class="cd"><h3>Top 5 Posts <span class="sub">(by reach x engagement)</span></h3><table class="mini-dt"><thead><tr><th>Post</th><th class="n">Reach</th><th class="n">Eng.</th><th class="n">ER%</th><th class="n">Date</th></tr></thead><tbody>';
  (d.top_posts||[]).forEach(p=>{h+=`<tr><td><a href="${p.link}" target="_blank" style="color:var(--al);text-decoration:none">${p.text}</a></td><td class="n">${p.reach}</td><td class="n">${p.engagement}</td><td class="n">${p.er}%</td><td class="n">${fdate(p.date)}</td></tr>`;});
  h+='</tbody></table></div>';

  container.innerHTML=h;

  // Now create charts
  var chOpts={responsive:true,maintainAspectRatio:false,plugins:{legend:{display:false}},scales:{x:{ticks:{color:'#6F90C8'}},y:{ticks:{color:'#90BFED',font:{size:9}}}}};

  // Editorial chart
  var eds=(d.editorial||[]).sort((a,b)=>b.total_eng-a.total_eng);
  if(eds.length>0){
    var c=new Chart(document.getElementById(cid+'-edit'),{type:'bar',data:{labels:eds.map(e=>e.category.length>22?e.category.substr(0,19)+'...':e.category),datasets:[{data:eds.map(e=>e.total_eng),backgroundColor:co+'90',borderColor:co,borderWidth:1}]},options:{indexAxis:'y',...chOpts,plugins:{legend:{display:false},tooltip:{callbacks:{afterLabel:ctx=>eds[ctx.dataIndex].avg_er+'% avg ER, '+eds[ctx.dataIndex].posts+' posts'}}}}});
    void(c);
  }

  // Format chart
  var fmts=(d.format||[]).sort((a,b)=>b.total_eng-a.total_eng);
  if(fmts.length>0){
    var c=new Chart(document.getElementById(cid+'-fmt'),{type:'bar',data:{labels:fmts.map(f=>f.format),datasets:[{data:fmts.map(f=>f.total_eng),backgroundColor:co+'90',borderColor:co,borderWidth:1}]},options:{indexAxis:'y',...chOpts,plugins:{legend:{display:false},tooltip:{callbacks:{afterLabel:ctx=>fmts[ctx.dataIndex].avg_er+'% avg ER, '+fmts[ctx.dataIndex].posts+' posts'}}}}});
    void(c);
  }

  // Weekday chart
  var wds=(d.weekdays||[]).sort((a,b)=>a.day-b.day);
  var dayEl=document.getElementById(cid+'-day');
  if(dayEl&&wds.length>0){
    var bestDay=wds.reduce((a,b)=>b.avg_eng>a.avg_eng?b:a);
    var colors=wds.map(w=>w.day===bestDay.day?co:co+'50');
    var c=new Chart(dayEl,{type:'bar',data:{labels:wds.map(w=>w.day_name),datasets:[{data:wds.map(w=>w.avg_eng),backgroundColor:colors,borderColor:co,borderWidth:1}]},options:{...chOpts,plugins:{legend:{display:false},tooltip:{callbacks:{afterLabel:ctx=>wds[ctx.dataIndex].posts+' posts'}}}}});
    void(c);
  }

  // Hours chart
  var hrs=(d.hours||[]).sort((a,b)=>a.hour-b.hour);
  var hrEl=document.getElementById(cid+'-hr');
  if(hrEl&&hrs.length>0){
    var bestHr=hrs.reduce((a,b)=>b.avg_eng>a.avg_eng?b:a);
    var c=new Chart(hrEl,{type:'bar',data:{labels:hrs.map(h=>h.hour+':00'),datasets:[{data:hrs.map(h=>h.avg_eng),backgroundColor:hrs.map(h=>h.hour===bestHr.hour?co:co+'50'),borderColor:co,borderWidth:1}]},options:{...chOpts,plugins:{legend:{display:false},tooltip:{callbacks:{afterLabel:ctx=>hrs[ctx.dataIndex].posts+' posts'}}}}});
    void(c);
  }

  // Audience chart
  var auds=(d.audience||[]).sort((a,b)=>b.avg_er-a.avg_er);
  var audEl=document.getElementById(cid+'-aud');
  if(audEl&&auds.length>0){
    var c=new Chart(audEl,{type:'bar',data:{labels:auds.map(a=>a.audience),datasets:[{data:auds.map(a=>a.avg_er),backgroundColor:co+'90',borderColor:co,borderWidth:1}]},options:{indexAxis:'y',...chOpts,plugins:{legend:{display:false},tooltip:{callbacks:{afterLabel:ctx=>auds[ctx.dataIndex].posts+' posts'}}}}});
    void(c);
  }
  }catch(err){container.innerHTML='<p style="color:var(--dn)">Error rendering '+platform+': '+err.message+'</p>';console.error('Channel render error:',err);}
}

// ── PAID ADS TAB ──
function renderAdsTab(container){
  if(!D)return;
  var adsMonthly=D.ads_monthly||{};
  var monthKeys=Object.keys(adsMonthly).sort();
  var drill=D.campaign_drill||{};

  // Determine which month to show based on date filter
  var range2=getRange();
  var filterMonth=range2?range2.e.substring(0,7):null; // e.g. "2026-03"
  var prevMonth=null;

  // Find the matching month in data, or use latest
  var currMonthKey=null,prevMonthKey=null;
  if(filterMonth&&adsMonthly[filterMonth]){
    currMonthKey=filterMonth;
  }else if(monthKeys.length>0){
    currMonthKey=monthKeys[monthKeys.length-1];
  }
  // Previous month
  if(currMonthKey){
    var idx2=monthKeys.indexOf(currMonthKey);
    if(idx2>0)prevMonthKey=monthKeys[idx2-1];
  }

  var camps=currMonthKey?adsMonthly[currMonthKey]:(D.campaigns||[]);
  var prevCamps=prevMonthKey?adsMonthly[prevMonthKey]:[];

  if(camps.length===0){container.innerHTML='<p style="color:var(--dim);padding:20px">No campaign data for this period.</p>';return;}

  // Compute current period stats
  var totalSpend=0,totalImps=0,totalReach=0,totalClicks=0;
  var leadResults=0,leadSpend=0,engResults=0,engSpend=0,trafficResults=0,trafficSpend=0;
  camps.forEach(function(c){
    totalSpend+=c.spend;totalImps+=c.impressions;totalReach+=c.reach;totalClicks+=c.clicks;
    var nm=c.name.toLowerCase();
    if(nm.indexOf('lead')>=0||nm.indexOf('instant')>=0||nm.indexOf('broker')>=0){leadResults+=c.results;leadSpend+=c.spend;}
    else if(nm.indexOf('engagement')>=0){engResults+=c.results;engSpend+=c.spend;}
    else{trafficResults+=c.results;trafficSpend+=c.spend;}
  });

  // Compute previous period stats
  var pTotalSpend=0,pLeadResults=0,pLeadSpend=0,pEngResults=0,pTrafficResults=0;
  prevCamps.forEach(function(c){
    pTotalSpend+=c.spend;
    var nm=c.name.toLowerCase();
    if(nm.indexOf('lead')>=0||nm.indexOf('instant')>=0||nm.indexOf('broker')>=0){pLeadResults+=c.results;pLeadSpend+=c.spend;}
    else if(nm.indexOf('engagement')>=0){pEngResults+=c.results;}
    else{pTrafficResults+=c.results;}
  });

  var totalLeadCPR=leadResults>0?leadSpend/leadResults:0;
  var pLeadCPR=pLeadResults>0?pLeadSpend/pLeadResults:0;
  var avgCPR=totalLeadCPR;
  var hasPrevAds=prevCamps.length>0;
  var currLabel2=currMonthKey?MO[parseInt(currMonthKey.split('-')[1])-1]+' '+currMonthKey.split('-')[0]:'Current';
  var prevLabel2=prevMonthKey?MO[parseInt(prevMonthKey.split('-')[1])-1]+' '+prevMonthKey.split('-')[0]:'Previous';

  var h='<h2 style="font-family:Montserrat;font-size:16px;margin-bottom:14px">&#128176; Paid Ads — '+currLabel2+'</h2>';

  // KPI cards with comparison
  h+='<div class="kg" style="grid-template-columns:repeat(4,1fr);margin-bottom:8px">';
  [{l:'Total Spend',c:totalSpend,p:pTotalSpend,pfx:'$'},{l:'Impressions',c:totalImps},{l:'Reach',c:totalReach},{l:'Link Clicks',c:totalClicks}].forEach(function(k2){
    var ch2=hasPrevAds?pch(k2.p||0,k2.c):{t:'',c:'fl'};
    h+='<div class="kc"><div class="l">'+k2.l+'</div><div class="v">'+(k2.pfx||'')+fnum(k2.c)+'</div>'+(hasPrevAds?'<div class="ch '+ch2.c+'">'+arw(ch2.c)+' '+ch2.t+' vs '+prevLabel2+'</div>':'')+'</div>';
  });
  h+='</div>';
  h+='<div class="kg" style="grid-template-columns:repeat(3,1fr);margin-bottom:16px">';
  var leadCh=hasPrevAds?pch(pLeadResults,leadResults):{t:'',c:'fl'};
  var cplCh=hasPrevAds&&pLeadCPR>0?pch(pLeadCPR,totalLeadCPR):{t:'',c:'fl'};

  // Campaign table with prev month comparison

  // ── META RECOMMENDATIONS ──
  var metaRecsEl=document.getElementById('meta-recs');

    var mrecs=D.meta_recommendations||[];
    if(mrecs.length===0){

    }else{

    var totalLeadSpend=leadCamps2.reduce(function(s,c){return s+c.spend;},0);

    var funnelHtml='<div class="funnel" style="margin-bottom:12px">';
    [{l:'Ad Impressions',v:totalImps,d:true},{l:'Link Clicks',v:totalClicks,d:true},{l:'Form Leads',v:totalLeadsFromAds,d:totalLeadsFromAds>0},{l:'Contacted',v:0,d:false},{l:'Replied',v:0,d:false},{l:'Qualified',v:0,d:false},{l:'Meeting',v:0,d:false},{l:'Closed Deal',v:0,d:false}].forEach(function(s,i){

    // Track ad sets already flagged to avoid contradictions

    camps.filter(function(c){return c.spend>50&&c.results===0;}).forEach(function(c){

    });
    Object.keys(abPairs2).forEach(function(k){
      var p=abPairs2[k];if(p.length<2)return;
      p.sort(function(a,b){return(a.cpr||999)-(b.cpr||999);});

      }

    // Sort by severity
    actions.sort(function(a,b){return a.sev-b.sev;});

    // Render as clean table
    var sevLabels={critical:'URGENT',high:'HIGH',medium:'MEDIUM',low:'LOW'};

    if(actions.length===0){
      actHtml+='<tr><td colspan="4" style="padding:12px;color:var(--dim)">No critical actions needed. All campaigns performing within acceptable ranges.</td></tr>';
    }else{
      actions.forEach(function(a,ai){
        var sevColor=sevColors[a.type]||'var(--dim)';
        // Check if action has expandable HTML (contains onclick)
        var hasExpand=a.action.indexOf('onclick')>=0;

        actHtml+='<td style="padding:8px 6px;font-size:9px;color:var(--dim);vertical-align:top">'+a.where+'</td>';
        actHtml+='</tr>';
      });
    }
    actHtml+='</table>';
    actionsEl.innerHTML=actHtml;
  }

  // ── STRATEGIC ANALYSIS ──
  var analysis=document.getElementById('ads-analysis');
  var aText='';

  // Budget allocation
  var campsSorted=camps.slice().sort(function(a,b){return b.spend-a.spend;});

  var engCamps=camps.filter(function(c){return c.name.toLowerCase().indexOf('engagement')>=0;});

  if(engCamps.length>0||leadCamps3.length>0||webinarCamps.length>0){

    if(engS>0)aText+=' | Engagement: '+((engS/totalSpend)*100).toFixed(0)+'% ($'+fnum(engS)+')';
    aText+='</div>';

  // Efficiency comparison
  if(sortedCamps.length>1){
    aText+='<div class="conc" style="margin-bottom:8px">&#128176; <strong>Efficiency range:</strong> Best CPR: $'+sortedCamps[0].cpr.toFixed(2)+' ('+sortedCamps[0].name.substring(0,25)+') → Worst: $'+sortedCamps[sortedCamps.length-1].cpr.toFixed(2)+' ('+sortedCamps[sortedCamps.length-1].name.substring(0,25)+'). That is a <strong>'+(sortedCamps[sortedCamps.length-1].cpr/sortedCamps[0].cpr).toFixed(0)+'x difference</strong>. Reallocating budget from worst to best could significantly improve overall ROI.</div>';
  }

  // Monthly note
  aText+='<div class="conc" style="margin-bottom:8px;opacity:0.6">&#128197; Monthly comparison will be available after the next weekly data download. Current data covers one reporting period.</div>';

  analysis.innerHTML=aText;

// Ads tab drill-down
function showAdsDrill(campIdx){
  var dd=document.getElementById('ads-drill');
  var title=document.getElementById('ads-drill-title');
  var body=document.getElementById('ads-drill-body');
  if(!dd||!D)return;
  var campaign=D.campaigns[campIdx];
  if(!campaign)return;

  if(dd.style.display==='block'&&dd.getAttribute('data-idx')==String(campIdx)){dd.style.display='none';return;}
  dd.setAttribute('data-idx',campIdx);

  var drillData=D.campaign_drill||{};
  var adSets=null;
  for(var key in drillData){if(campaign.name.indexOf(key.substring(0,20))>=0||key.indexOf(campaign.name.substring(0,20))>=0){adSets=drillData[key];break;}}
  if(!adSets)adSets=[];

  var avgCPR2=D.campaigns.reduce(function(s,c){return s+c.cpr;},0)/Math.max(D.campaigns.length,1);

  title.innerHTML='&#9660; '+campaign.name+' ('+adSets.length+' ad sets)';
  body.innerHTML='';

  if(adSets.length===0){body.innerHTML='<tr><td colspan="5" style="color:var(--dim);padding:12px">No ad sets found.</td></tr>';dd.style.display='block';return;}

  adSets.forEach(function(aset){
    var cl=aset.cpr>avgCPR2*1.5?'w':(aset.results>0&&aset.cpr<avgCPR2*0.5?'g':'');
    var hasAds=aset.ads&&aset.ads.length>0;
    var spendPct=campaign.spend>0?((aset.spend/campaign.spend)*100).toFixed(0):'0';
    var tr=document.createElement('tr');
    tr.style.background='#0a1e3a';
    if(hasAds)tr.style.cursor='pointer';
    var dlB='';if(aset.delivery==='Learning limited')dlB='<span style="display:inline-block;padding:1px 5px;background:#CC0000;color:white;border-radius:3px;font-size:7px;font-weight:700;margin-left:4px">LEARNING LIMITED</span>';else if(aset.delivery==='Learning')dlB='<span style="display:inline-block;padding:1px 5px;background:#fbbf24;color:#001A35;border-radius:3px;font-size:7px;font-weight:700;margin-left:4px">LEARNING</span>';
    var rcB=aset.recs?'<span style="display:inline-block;padding:1px 5px;background:var(--blue);color:white;border-radius:3px;font-size:7px;margin-left:4px">'+aset.recs+'</span>':'';
    tr.innerHTML='<td style="padding-left:12px;font-weight:600">'+(hasAds?'&#9654; ':'')+aset.name+dlB+rcB+' <span style="color:var(--dim);font-size:8px">('+spendPct+'% of spend'+(hasAds?', '+aset.ads.length+' ads':'')+') </span></td><td class="n">$'+aset.spend.toLocaleString()+'</td><td class="n">'+aset.results.toLocaleString()+'</td><td class="n '+cl+'">$'+aset.cpr.toFixed(2)+'</td><td class="n">'+aset.clicks.toLocaleString()+'</td>';
    body.appendChild(tr);
    if(hasAds){
      var adRows=[];
      aset.ads.forEach(function(ad){
        var adcl=ad.cpr>avgCPR2*1.5?'w':(ad.results>0&&ad.cpr<avgCPR2*0.5?'g':'');
        var adtr=document.createElement('tr');
        adtr.style.display='none';
        var thumb=(ad.preview&&ad.preview.indexOf('thumbs/')===0)?'<img src="'+ad.preview+'" style="width:36px;height:36px;border-radius:4px;object-fit:cover;vertical-align:middle;margin-right:8px;border:1px solid var(--cb)" onerror="this.style.display=\'none\'">':'';
        adtr.innerHTML='<td style="padding-left:24px;font-size:9px;color:var(--al)">'+thumb+'&#8627; '+ad.name+'</td><td class="n" style="font-size:9px">$'+ad.spend.toLocaleString()+'</td><td class="n" style="font-size:9px">'+ad.results.toLocaleString()+'</td><td class="n '+adcl+'" style="font-size:9px">$'+ad.cpr.toFixed(2)+'</td><td class="n" style="font-size:9px">'+ad.clicks.toLocaleString()+'</td>';
        body.appendChild(adtr);
        adRows.push(adtr);
      });
      tr.addEventListener('click',function(){
        var vis=adRows[0].style.display!=='none';
        adRows.forEach(function(r){r.style.display=vis?'none':'table-row';});
        tr.querySelector('td').innerHTML=(vis?'&#9654; ':'&#9660; ')+aset.name+' <span style="color:var(--dim);font-size:8px">('+spendPct+'% of spend, '+aset.ads.length+' ads)</span>';
      });
    }
  });
  dd.style.display='block';
  dd.scrollIntoView({behavior:'smooth',block:'nearest'});
}

// ── SEARCH ENGINE ──
function ask(){
  var q=document.getElementById('qi').value.toLowerCase().trim();
  if(!q||!D)return;
  document.getElementById('at').innerHTML=analyzeQ(q);
  document.getElementById('sa').classList.add('vis');
}
function analyzeQ(q){
  var pm=q.match(/\b(instagram|facebook|linkedin|ig|fb|li)\b/);
  var plat=pm?({instagram:'Instagram',ig:'Instagram',facebook:'Facebook',fb:'Facebook',linkedin:'LinkedIn',li:'LinkedIn'})[pm[1]]:null;
  var is=(pat)=>pat.test(q);
  // Content/format/type
  if(is(/content|type|kind|format|reel|video|photo|carousel|editorial|category/)){
    if(plat){
      var cd=D.channel_detail[plat];if(!cd)return noD(q,'content data for '+plat);
      var f=cd.format||[],e=cd.editorial||[];
      var r=`<strong>${plat} Content Analysis:</strong><br>`;
      if(f.length){r+=`<br><strong>Best format:</strong> <strong>${f[0].format}</strong> with ${f[0].total_eng} interactions (${f[0].posts} posts, ${f[0].avg_er}% avg ER).`;if(f.length>1)r+=' Others: '+f.slice(1).map(x=>x.format+': '+x.total_eng+' int.').join(', ')+'.';}
      if(e.length){r+=`<br><strong>Best category:</strong> <strong>${e[0].category}</strong> with ${e[0].total_eng} interactions (${e[0].avg_er}% ER).`;}
      r+=`<br><br><em>Recommendation: Focus on ${f[0]?.format||'top'} format + ${e[0]?.category||'engaging'} content for ${plat}.</em>`;return r;
    }
    var c={};D.editorial_performance.forEach(e=>{if(!c[e.category])c[e.category]={r:0,n:0,e:0};c[e.category].r+=e.avg_engagement_rate;c[e.category].n++;c[e.category].e+=e.total_engagement;});
    var s=Object.entries(c).sort((a,b)=>b[1].e-a[1].e);if(!s.length)return noD(q,'content categories');
    var r='<strong>Content Performance (all platforms):</strong><br><br>';
    s.forEach(([cat,v],i)=>{r+=`${i+1}. <strong>${cat}</strong>: ${v.e} interactions, ${(v.r/v.n).toFixed(1)}% avg ER<br>`;});
    r+=`<br><em>Create more "${s[0][0]}" content for maximum interactions.</em>`;return r;
  }
  if(is(/audience|segment|who|target/)){
    var ad=plat?D.channel_detail[plat]?.audience:D.audience_performance;
    if(!ad||!ad.length)return noD(q,'audience data');
    var g={};ad.forEach(a=>{var k=a.audience;if(!g[k])g[k]={r:0,n:0};g[k].r+=a.avg_engagement_rate||a.avg_er||0;g[k].n++;});
    var s=Object.entries(g).sort((a,b)=>(b[1].r/b[1].n)-(a[1].r/a[1].n));
    var r=`<strong>Audience Performance${plat?' on '+plat:''}:</strong><br><br>`;
    s.forEach(([a,v])=>{r+=`- <strong>${a}</strong>: ${(v.r/v.n).toFixed(1)}% avg ER<br>`;});
    r+=`<br><em>The <strong>${s[0][0]}</strong> audience responds best.</em>`;return r;
  }
  if(is(/day\b|weekday|monday|tuesday|wednesday|thursday|friday|saturday|sunday|best day/)){
    var p=plat||'Facebook';var wds=D.channel_detail[p]?.weekdays;
    if(!wds||!wds.length)return noD(q,'weekday posting data for '+p);
    var sorted=[...wds].sort((a,b)=>b.avg_eng-a.avg_eng);
    var r=`<strong>Best Day to Post on ${p}:</strong><br><br>`;
    sorted.forEach(w=>{r+=`- <strong>${w.day_name}</strong>: ${w.avg_eng.toFixed(1)} avg engagement (${w.posts} posts)<br>`;});
    r+=`<br><em><strong>${sorted[0].day_name}</strong> gets the most engagement on ${p}. Consider scheduling your most important content for this day.</em>`;
    return r;
  }
  if(is(/time|hour|when|schedule|posting time/)){
    var p=plat||'Instagram';var hrs2=D.channel_detail[p]?D.channel_detail[p].hours:null;
    if(!hrs2||!hrs2.length)return 'I can not tell you the exact best posting time for '+p+(p==='LinkedIn'?' because LinkedIn exports do not include post times':' with the current data')+'.<br><br>However, most posts are published 7-11 AM UTC. Take this to Marina to set up posting time experiments.';
    // Sort by engagement DESC to show best first
    var hrsSorted=hrs2.slice().sort(function(a,b){return b.avg_eng-a.avg_eng;});
    var bestHr2=hrsSorted[0];
    var r='<strong>Best Posting Times for '+p+':</strong><br><br>';
    hrsSorted.slice(0,5).forEach(function(h2){r+='- <strong>'+h2.hour+':00 UTC</strong>: '+h2.avg_eng.toFixed(1)+' avg engagement ('+h2.posts+' posts)<br>';});
    r+='<br><em>Schedule top content for <strong>'+bestHr2.hour+':00 UTC</strong> (highest avg engagement: '+bestHr2.avg_eng.toFixed(1)+').</em>';return r;
  }
  if(is(/platform|channel|where|focus|which.*best/)){
    var s=[...D.platform_comparison].sort((a,b)=>b.curr_engagement_rate-a.curr_engagement_rate);
    var r='<strong>Platform Comparison:</strong><br><br>';
    s.forEach(p=>{var ch=pch(p.prev_engagement_rate,p.curr_engagement_rate);r+=`- <strong>${p.platform}</strong>: ${p.curr_engagement_rate}% ER (${ch.t}) | ${p.curr_reach.toLocaleString()} reach | ${p.curr_engagement} int.<br>`;});
    r+=`<br><em><strong>${s[0].platform}</strong> has the best engagement rate. For volume, ${[...D.platform_comparison].sort((a,b)=>b.curr_reach-a.curr_reach)[0].platform} has the most reach.</em>`;return r;
  }
  if(is(/campaign|ad\b|ads\b|spend|budget|paid|cost per|cpr|roi/)){
    if(!D.campaigns.length)return noD(q,'campaign data');
    var s=[...D.campaigns].filter(c=>c.results>0).sort((a,b)=>a.cpr-b.cpr);
    var r='<strong>Paid Campaign Analysis:</strong><br><br>';
    r+=`Total: <strong>$${D.campaigns.reduce((s,c)=>s+c.spend,0).toLocaleString()}</strong> spend, <strong>${D.campaigns.reduce((s,c)=>s+c.results,0).toLocaleString()}</strong> results<br><br>`;
    if(s.length){r+=`Best: <strong>${s[0].name}</strong> ($${s[0].cpr.toFixed(2)}/result)<br>`;if(s.length>1)r+=`Worst: <strong>${s[s.length-1].name}</strong> ($${s[s.length-1].cpr.toFixed(2)}/result)<br><em>Consider shifting budget to "${s[0].name}".</em>`;}
    return r;
  }
  if(is(/best post|top post|perform|what worked|winner/)){
    var ps=plat?D.top_posts.filter(p=>p.platform===plat):D.top_posts;
    if(!ps.length)return noD(q,'top posts'+(plat?' on '+plat:''));
    var r=`<strong>Top Posts${plat?' on '+plat:''}:</strong><br><br>`;
    ps.slice(0,3).forEach((p,i)=>{var pts=[];if(p.likes)pts.push(p.likes+' likes');if(p.comments)pts.push(p.comments+' cmts');if(p.shares)pts.push(p.shares+' shares');r+=`${i+1}. "<strong>${p.text}</strong>"<br>&nbsp;&nbsp;${p.platform} | ${p.reach} reach | ${p.engagement} int. (${pts.join(', ')}) | ${p.engagement_rate}% ER<br>`;});
    r+=`<br><em>Pattern: ${ps[0].editorial?'"'+ps[0].editorial+'" content':'interactive content'} drives the best results.</em>`;return r;
  }
  if(is(/lead|funnel|traffic|conversion|mql/)){
    var f=D.funnel;if(!f?.traffic)return noD(q,'funnel data');
    var r='<strong>Funnel:</strong><br><br>';
    r+=`- Traffic: <strong>${fnum(f.traffic.current)}</strong> (${pch(f.traffic.previous,f.traffic.current).t})<br>`;
    r+=`- Leads: <strong>${fnum(f.leads.month_3)}</strong> (${pch(f.leads.month_2,f.leads.month_3).t})<br>`;
    r+=`<br>MQLs, SQLs, Sales, Revenue not yet tracked. Take this to Marina to set up deal pipeline in HubSpot.`;return r;
  }
  if(is(/follower|grow|community/)){
    var f=D.kpis.followers,fp=D.kpis.followers_prev;
    var r=`<strong>Followers:</strong><br>Total: <strong>${fnum(f.total)}</strong><br>`;
    [{n:'Facebook',c:f.facebook,p:fp.facebook},{n:'Instagram',c:f.instagram,p:fp.instagram},{n:'LinkedIn',c:f.linkedin,p:fp.linkedin}].forEach(x=>{r+=`- ${x.n}: <strong>${fnum(x.c)}</strong> (${pch(x.p,x.c).t})<br>`;});
    return r;
  }
  if(is(/engagement|interact|like|comment|share/)){
    var r='<strong>Engagement:</strong><br><br>';
    D.platform_comparison.forEach(p=>{r+=`- ${p.platform}: <strong>${p.curr_engagement}</strong> int. (${p.curr_engagement_rate}% ER, ${p.curr_reach.toLocaleString()} reach)<br>`;});
    r+=`<br><em>Use question hooks, fill-in-the-blank, and reply to comments within 1 hour.</em>`;return r;
  }
  return noD(q);
}
function noD(q,topic){
  var r=`I do not have enough data in my database to give a precise answer about "<em>${q}</em>".`;
  if(topic)r+=` I am missing detailed data on <strong>${topic}</strong>.`;
  r+='<br><br><em>Take this to Marina so she can work through it and see if it is possible to add the needed data.</em>';
  r+='<br><br>I can answer about: platform comparison, content categories, audience segments, posting times, campaigns, top posts, funnel/leads, followers.';
  return r;
}

// ── Campaign Drill-Down ──
function showDrillDown(campaignIdx){
  var dd=document.getElementById('drill-down');
  var title=document.getElementById('drill-title');
  var body=document.getElementById('drill-body');
  if(!dd||!D||!D.campaigns[campaignIdx])return;

  var campaign=D.campaigns[campaignIdx];
  var campaignName=campaign.name;

  // Toggle off
  if(dd.style.display==='block'&&dd.getAttribute('data-idx')==String(campaignIdx)){
    dd.style.display='none';return;
  }
  dd.setAttribute('data-idx',campaignIdx);

  // Get ad sets for THIS campaign only
  var drillData=D.campaign_drill||{};
  var adSets=null;
  // Try exact match first, then partial match
  for(var key in drillData){
    if(key===campaignName||campaignName.indexOf(key.substring(0,20))>=0||key.indexOf(campaignName.substring(0,20))>=0){
      adSets=drillData[key];break;
    }
  }
  if(!adSets)adSets=[];

  var avgCPR=D.campaigns.reduce(function(s,c){return s+c.cpr;},0)/Math.max(D.campaigns.length,1);

  title.innerHTML='&#9660; '+campaignName+' <span style="color:var(--dim);font-size:10px">('+adSets.length+' ad sets)</span>';
  body.innerHTML='';

  if(adSets.length===0){
    body.innerHTML='<tr><td colspan="5" style="color:var(--dim);padding:12px">No ad sets found for this campaign.</td></tr>';
    dd.style.display='block';return;
  }

  adSets.forEach(function(aset,si){
    var cl=aset.cpr>avgCPR*1.5?'w':(aset.results>0&&aset.cpr<avgCPR*0.5?'g':'');
    var hasAds=aset.ads&&aset.ads.length>0;
    var spendPct=campaign.spend>0?((aset.spend/campaign.spend)*100).toFixed(0):'0';

    var tr=document.createElement('tr');
    tr.style.background='#0a1e3a';
    if(hasAds)tr.style.cursor='pointer';
    var dlB='';if(aset.delivery==='Learning limited')dlB='<span style="display:inline-block;padding:1px 5px;background:#CC0000;color:white;border-radius:3px;font-size:7px;font-weight:700;margin-left:4px">LEARNING LIMITED</span>';else if(aset.delivery==='Learning')dlB='<span style="display:inline-block;padding:1px 5px;background:#fbbf24;color:#001A35;border-radius:3px;font-size:7px;font-weight:700;margin-left:4px">LEARNING</span>';
    var rcB=aset.recs?'<span style="display:inline-block;padding:1px 5px;background:var(--blue);color:white;border-radius:3px;font-size:7px;margin-left:4px">'+aset.recs+'</span>':'';
    tr.innerHTML='<td style="padding-left:12px;font-weight:600">'+(hasAds?'&#9654; ':'')+aset.name+dlB+rcB+' <span style="color:var(--dim);font-size:8px">('+spendPct+'% of spend'+(hasAds?', '+aset.ads.length+' ads':'')+') </span></td><td class="n">$'+aset.spend.toLocaleString()+'</td><td class="n">'+aset.results.toLocaleString()+'</td><td class="n '+cl+'">$'+aset.cpr.toFixed(2)+'</td><td class="n">'+aset.clicks.toLocaleString()+'</td>';
    body.appendChild(tr);

    var adRows=[];
    if(hasAds){
      aset.ads.forEach(function(ad){
        var adcl=ad.cpr>avgCPR*1.5?'w':(ad.results>0&&ad.cpr<avgCPR*0.5?'g':'');
        var adtr=document.createElement('tr');
        adtr.style.display='none';
        var thumb=(ad.preview&&ad.preview.indexOf('thumbs/')===0)?'<img src="'+ad.preview+'" style="width:36px;height:36px;border-radius:4px;object-fit:cover;vertical-align:middle;margin-right:8px;border:1px solid var(--cb)" onerror="this.style.display=\'none\'">':'';
        adtr.innerHTML='<td style="padding-left:24px;font-size:9px;color:var(--al)">'+thumb+'&#8627; '+ad.name+'</td><td class="n" style="font-size:9px">$'+ad.spend.toLocaleString()+'</td><td class="n" style="font-size:9px">'+ad.results.toLocaleString()+'</td><td class="n '+adcl+'" style="font-size:9px">$'+ad.cpr.toFixed(2)+'</td><td class="n" style="font-size:9px">'+ad.clicks.toLocaleString()+'</td>';
        body.appendChild(adtr);
        adRows.push(adtr);
      });
      tr.addEventListener('click',function(){
        var vis=adRows[0].style.display!=='none';
        adRows.forEach(function(r){r.style.display=vis?'none':'table-row';});
        tr.querySelector('td').innerHTML=(vis?'&#9654; ':'&#9660; ')+aset.name+' <span style="color:var(--dim);font-size:8px">('+spendPct+'% of spend, '+aset.ads.length+' ads)</span>';
      });
    }
  });

  dd.style.display='block';
  dd.scrollIntoView({behavior:'smooth',block:'nearest'});
}

// ── Init ──
async function init(){
  try{
    var resp=await fetch('dashboard_data.json');
    D=await resp.json();
    renderAll();
  }catch(err){
    document.getElementById('dashboard-content').innerHTML='<p style="color:red">Dashboard error: '+err.message+'</p>';
    console.error('Dashboard init error:',err);
  }
}
init();
</script>
